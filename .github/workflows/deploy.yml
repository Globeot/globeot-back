name: Deploy to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build jar
        run: ./gradlew clean bootJar -x test

      - name: Set up SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Copy jar to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem build/libs/*.jar \
          ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:~/globeot-back/app.jar

      - name: Deploy on EC2
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem \
          ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'
          set -e

          cd ~/globeot-back

          cat > .env.properties << 'ENVEOF'
          ${{ secrets.ENV_FILE }}
          ENVEOF

          echo "Stopping app..."
          if [ -f app.pid ]; then
            kill -15 "$(cat app.pid)" || true
            rm -f app.pid
            sleep 5
          fi

          pkill -f 'app.jar' || true
          sleep 5

          echo "Starting app..."
          setsid nohup java -Xms256m -Xmx512m -jar app.jar \
            --spring.profiles.active=prod \
            --spring.config.additional-location=file:.env.properties \
            > app.log 2>&1 < /dev/null &

          echo $! > app.pid

          sleep 10

          echo "PID: $(cat app.pid)"
          ps -p "$(cat app.pid)" -o pid,cmd

          echo "Health check:"
          curl -I http://localhost:8080/health || true

          EOF